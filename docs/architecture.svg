<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 700" font-family="'Segoe UI','Noto Sans JP',sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3080D0"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#40A050"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7B1FA2"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="920" height="700" fill="#FAFAFA" rx="8"/>

  <!-- タイトル -->
  <text x="460" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">popone アーキテクチャ (v0.2.3)</text>

  <!-- 入力ファイル -->
  <rect x="40" y="50" width="130" height="36" rx="18" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
  <text x="105" y="73" text-anchor="middle" font-weight="bold" fill="#1A56DB">VRM (.vrm/.glb)</text>

  <rect x="190" y="50" width="110" height="36" rx="18" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
  <text x="245" y="73" text-anchor="middle" font-weight="bold" fill="#1A56DB">FBX (.fbx)</text>

  <rect x="320" y="50" width="110" height="36" rx="18" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
  <text x="375" y="73" text-anchor="middle" font-weight="bold" fill="#1A56DB">PMX (.pmx)</text>

  <rect x="450" y="50" width="110" height="36" rx="18" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5"/>
  <text x="505" y="73" text-anchor="middle" font-weight="bold" fill="#1A56DB">PMD (.pmd)</text>

  <!-- 出力ファイル -->
  <rect x="760" y="170" width="120" height="36" rx="18" fill="#FDE8E8" stroke="#E04040" stroke-width="1.5"/>
  <text x="820" y="193" text-anchor="middle" font-weight="bold" fill="#C02020">PMX (.pmx)</text>

  <!-- 分岐ラベル -->
  <text x="240" y="112" font-size="11" fill="#666">[引数あり] CLI 変換 (VRM/FBX のみ)</text>
  <text x="160" y="520" font-size="11" fill="#666">[引数なし] ビューア (全形式対応)</text>

  <!-- ── モジュールボックス群 ── -->

  <!-- vrm/ -->
  <rect x="30" y="140" width="140" height="120" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="100" y="160" text-anchor="middle" font-weight="bold" fill="#1565C0">vrm/</text>
  <text x="45" y="180" font-size="11" fill="#444">loader</text>
  <text x="45" y="196" font-size="11" fill="#444">extract</text>
  <text x="45" y="212" font-size="11" fill="#444">detect</text>
  <text x="45" y="228" font-size="11" fill="#444">types_v0 / v1</text>

  <!-- fbx/ -->
  <rect x="190" y="140" width="140" height="150" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="260" y="160" text-anchor="middle" font-weight="bold" fill="#1565C0">fbx/</text>
  <text x="205" y="180" font-size="11" fill="#444">parser</text>
  <text x="205" y="196" font-size="11" fill="#444">scene</text>
  <text x="205" y="212" font-size="11" fill="#444">extract</text>
  <text x="205" y="228" font-size="11" fill="#444">bone / mesh / skin</text>
  <text x="205" y="244" font-size="11" fill="#444">texture</text>
  <text x="205" y="260" font-size="11" fill="#444">humanoid / blendshape</text>

  <!-- pmx/ (読み書き両対応) -->
  <rect x="350" y="140" width="140" height="120" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="420" y="160" text-anchor="middle" font-weight="bold" fill="#B71C1C">pmx/</text>
  <text x="365" y="180" font-size="11" fill="#444">reader — PMX 読み込み</text>
  <text x="365" y="196" font-size="11" fill="#444">extract — → IrModel</text>
  <text x="365" y="212" font-size="11" fill="#444">build — IrModel → PMX</text>
  <text x="365" y="228" font-size="11" fill="#444">writer — PMX 書き出し</text>

  <!-- pmd/ -->
  <rect x="510" y="140" width="130" height="100" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="575" y="160" text-anchor="middle" font-weight="bold" fill="#B71C1C">pmd/</text>
  <text x="525" y="180" font-size="11" fill="#444">reader — PMD 読み込み</text>
  <text x="525" y="196" font-size="11" fill="#444">extract — → IrModel</text>
  <text x="525" y="212" font-size="11" fill="#444">types (Shift_JIS)</text>

  <!-- intermediate/ -->
  <rect x="200" y="320" width="165" height="100" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="282" y="340" text-anchor="middle" font-weight="bold" fill="#BF360C">intermediate/</text>
  <text x="215" y="362" font-size="11" fill="#444">IrModel (中間表現)</text>
  <text x="215" y="378" font-size="11" fill="#444">pose (A→T / T→A)</text>
  <text x="215" y="394" font-size="11" fill="#444">types / animation</text>

  <!-- convert/ -->
  <rect x="400" y="320" width="150" height="150" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="475" y="340" text-anchor="middle" font-weight="bold" fill="#1B5E20">convert/</text>
  <text x="415" y="362" font-size="11" fill="#444">coord — 座標変換</text>
  <text x="415" y="378" font-size="11" fill="#444">bone_map — ボーン名</text>
  <text x="415" y="394" font-size="11" fill="#444">material — 材質変換</text>
  <text x="415" y="410" font-size="11" fill="#444">morph — モーフ名</text>
  <text x="415" y="426" font-size="11" fill="#444">physics — 物理変換</text>
  <text x="415" y="442" font-size="11" fill="#444">texture / uvmap</text>

  <!-- viewer/ -->
  <rect x="40" y="540" width="310" height="146" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="195" y="560" text-anchor="middle" font-weight="bold" fill="#6A1B9A">viewer/</text>
  <text x="50" y="558" font-size="10" fill="#9C27B0">feature = "viewer"</text>
  <text x="55" y="582" font-size="11" fill="#444">app.rs — eframe::App 状態管理</text>
  <text x="55" y="598" font-size="11" fill="#444">gpu.rs — wgpu パイプライン・描画</text>
  <text x="55" y="614" font-size="11" fill="#444">mesh.rs — IrModel → GPU バッファ</text>
  <text x="55" y="630" font-size="11" fill="#444">texture.rs / camera.rs / grid.rs</text>
  <text x="55" y="646" font-size="11" fill="#444">ui.rs — 情報パネル・モーフ・変換</text>
  <text x="55" y="662" font-size="11" fill="#444">export_filter.rs — 材質フィルタ出力</text>

  <!-- ── 矢印（データフロー） ── -->

  <!-- VRM → vrm/ -->
  <line x1="105" y1="86" x2="100" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FBX → fbx/ -->
  <line x1="245" y1="86" x2="260" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PMX → pmx/ -->
  <line x1="375" y1="86" x2="400" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PMD → pmd/ -->
  <line x1="505" y1="86" x2="560" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- vrm/ → intermediate/ -->
  <path d="M100,260 L100,360 L198,360" fill="none" stroke="#3080D0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- fbx/ → intermediate/ -->
  <path d="M260,290 L260,370 L198,370" fill="none" stroke="#3080D0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- pmx/ extract → intermediate/ -->
  <path d="M420,260 L420,310 L367,340" fill="none" stroke="#3080D0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- pmd/ extract → intermediate/ -->
  <path d="M575,240 L575,310 L367,350" fill="none" stroke="#3080D0" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- intermediate/ → pmx/ build (CLI出力) -->
  <path d="M367,380 L660,380 L660,260 L490,210" fill="none" stroke="#40A050" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="670" y="340" font-size="10" fill="#40A050">CLI 変換</text>

  <!-- pmx/ writer → PMX output -->
  <path d="M490,190 L660,190 L758,190" fill="none" stroke="#E04040" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- convert/ → intermediate/pmx (参照) -->
  <line x1="400" y1="400" x2="367" y2="380" stroke="#40A050" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- intermediate/ → viewer/ -->
  <path d="M282,420 L282,480 L195,480 L195,538" fill="none" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- viewer/ → pmx/ (PMX変換ボタン) -->
  <path d="M350,600 L680,600 L680,260" fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="540" y="595" font-size="10" fill="#C62828">(PMX 変換ボタン, VRM/FBX のみ)</text>

  <!-- 凡例 -->
  <rect x="620" y="540" width="270" height="130" rx="6" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
  <text x="635" y="560" font-size="12" font-weight="bold" fill="#555">凡例</text>
  <line x1="635" y1="576" x2="670" y2="576" stroke="#3080D0" stroke-width="2"/>
  <text x="678" y="580" font-size="11" fill="#444">データフロー (→ IrModel)</text>
  <line x1="635" y1="596" x2="670" y2="596" stroke="#40A050" stroke-width="2"/>
  <text x="678" y="600" font-size="11" fill="#444">変換ロジック (IrModel → PMX)</text>
  <line x1="635" y1="616" x2="670" y2="616" stroke="#C62828" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="678" y="620" font-size="11" fill="#444">ビューアからの変換 (VRM/FBX)</text>
  <line x1="635" y1="636" x2="670" y2="636" stroke="#7B1FA2" stroke-width="2"/>
  <text x="678" y="640" font-size="11" fill="#444">ビューア表示 (全形式)</text>
  <line x1="635" y1="656" x2="670" y2="656" stroke="#555" stroke-width="2"/>
  <text x="678" y="660" font-size="11" fill="#444">ファイル入力</text>
</svg>
