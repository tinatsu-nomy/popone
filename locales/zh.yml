_version: 1

cli:
  about:
    summary: "将 VRM 文件转换为 PMX 格式"
    viewer_hint: "无参数启动时打开查看器"
  arg:
    input: "输入文件路径（VRM/FBX/PMX/PMD/OBJ/STL/.x/.unitypackage/.zip/.7z）"
    output: "输出 PMX 文件路径"
    dump: "仅输出骨骼/顶点数量，不生成 PMX"
    no_physics: "跳过物理转换"
    align_rigid_rotation: "将刚体旋转对齐到骨骼方向（默认: off）"
    normalize_pose: "将 T 姿势的手臂转换为 A 姿势（默认: off）"
    normalize_to_tstance: "将 A 姿势的手臂转换为 T 姿势（仅 FBX，默认: off）"
    log_level: "日志级别 (error, warn, info, debug)"
    fbx_name: "指定 unitypackage 内的 FBX 文件名（省略时自动选择最大的 FBX）"
    model_name: "指定压缩文件中的模型文件名（省略时：仅一个则自动，多个则报错）"
    list_models: "列出压缩文件中的模型并退出"
    raw_structure: "跳过标准骨骼插入（保留原始骨骼结构）"
    scale: "PMX 输出缩放系数（默认: 1.0）"
  dump:
    header: "=== %{format} 转储 ==="
    model_name: "模型名: %{name}"
    bones: "骨骼: %{count}"
    meshes: "网格: %{count}"
    vertices_total: "顶点 (合计): %{count}"
    faces_total: "面 (合计): %{count}"
    materials: "材质: %{count}"
    textures: "纹理: %{count}"
    morphs: "变形: %{count}"
    rigidbodies: "刚体: %{count}"
    joints: "关节: %{count}"
    rig_type: "骨架类型: %{rig} (Humanoid: %{count} 个骨骼)"
    bone_list_header: "--- 骨骼列表 ---"
    bone_entry: "  [%{index}] %{name} (vrm: %{vrm})"
    morph_list_header: "--- 变形列表 ---"
    morph_entry: "  [panel%{panel}] %{name}"
  output:
    no_models_in_archive: "压缩文件中未找到模型文件"
    archive_entry: "[%{kind}] %{path}"
    found_fbx_in_unitypackage: ".unitypackage 中找到 %{count} 个 FBX:"
    fbx_entry: "  FBX: %{name}"
    conversion_complete: "转换完成: %{input} -> %{output}"
    error_prefix: "错误"
  error:
    viewer_feature_required: "查看器需要使用 viewer feature 构建。\n用法: popone <输入.vrm> <输出.pmx>\n查看器: cargo build --features viewer"
    list_models_archive_only: "--list-models 仅适用于压缩文件（.zip / .7z）"
    archive_load_failed: "读取压缩文件失败: %{path}"
    unsupported_archive_format: "不支持的压缩文件格式: %{ext}"
    archive_list_failed: "获取压缩文件中的模型列表失败"
    model_name_cli_only: "--model-name 仅在 CLI 转换模式下有效。请指定输出文件。"
    output_required_zip: "需要指定输出文件路径。\n用法: popone <输入.zip> <输出.pmx>"
    output_required_vrm: "需要指定输出文件路径。\n用法: popone <输入.vrm> <输出.pmx>"
    logger_init_failed: "日志初始化失败"
    obj_extract_failed: "从 OBJ 提取中间表示失败"
    stl_extract_failed: "从 STL 提取中间表示失败"
    directx_extract_failed: "从 DirectX .x 提取中间表示失败"
    fbx_read_failed: "读取 FBX 文件失败: %{path}"
    fbx_extract_failed: "从 FBX 提取中间表示失败"
    unitypackage_read_failed: "读取 unitypackage 失败: %{path}"
    unitypackage_extract_failed: "解压 unitypackage 失败"
    unitypackage_no_fbx: ".unitypackage 中未找到 FBX 文件"
    fbx_not_found: "未找到指定的 FBX '%{name}'。可用: %{candidates}"
    prefab_resolve_failed: "解析 Prefab 纹理失败"
    glb_load_failed: "加载 GLB 失败: %{path}"
    vrm_extract_failed: "从 VRM 提取中间表示失败"
    output_dir_create_failed: "创建输出目录失败: %{path}"
    texture_write_failed: "写入纹理失败"
    pmx_build_failed: "构建 PMX 模型失败"
    output_file_create_failed: "创建输出文件失败: %{path}"
    pmx_conversion_cancelled: "PMX 转换已取消"
    pmx_write_failed: "写入 PMX 失败"
    archive_no_models_found: "压缩文件中未找到模型文件"
    archive_model_extract_failed: "解压模型失败"
    pmx_read_failed: "读取 PMX 失败"
    pmx_extract_failed: "从 PMX 提取中间表示失败"
    pmd_read_failed: "读取 PMD 失败"
    pmd_extract_failed: "从 PMD 提取中间表示失败"
    vrm_glb_read_failed: "读取 VRM/GLB 失败"
    archive_unitypackage_extract_failed: "解压压缩文件中的 unitypackage 失败"
    archive_unitypackage_no_fbx: "压缩文件中的 .unitypackage 未找到 FBX"
    fbx_not_found_simple: "未找到指定的 FBX '%{name}'"
    archive_multiple_models: "找到 %{count} 个模型。请使用 --model-name 指定，或使用 --list-models 查看列表"
    model_name_exact_multiple: "完全匹配 \"%{name}\" 的模型有 %{count} 个:\n  %{candidates}\n请使用 --list-models 确认后按路径指定。"
    model_name_prefix_multiple: "前缀匹配 \"%{name}\" 的模型有 %{count} 个:\n  %{candidates}\n请更具体地指定。"
    model_name_substr_multiple: "部分匹配 \"%{name}\" 的模型有 %{count} 个:\n  %{candidates}\n请更具体地指定。"
    model_name_no_match: "压缩文件中未找到与 \"%{name}\" 匹配的模型。\n请使用 --list-models 查看列表。"
    viewer_icon_load_failed: "加载图标图像失败"
    viewer_launch_failed: "启动查看器失败: %{detail}"

error:
  glb_file_load_failed: "读取 GLB 文件失败: %{path}"
  glb_data_load_failed: "读取 GLB 数据失败"
