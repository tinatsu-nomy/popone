    archive_load_failed: "アーカイブ読み込み失敗: %{path}"
    unsupported_archive_format: "未対応のアーカイブ形式: %{ext}"
    archive_list_failed: "アーカイブ内モデル一覧取得失敗"
    model_name_cli_only: "--model-name はCLI変換時のみ有効です。出力ファイルを指定してください"
    output_required_zip: "出力ファイルパスを指定してください。\n使い方: popone <入力.zip> <出力.pmx>"
    output_required_vrm: "出力ファイルパスを指定してください。\n使い方: popone <入力.vrm> <出力.pmx>"
