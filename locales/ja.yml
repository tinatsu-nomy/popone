_version: 1

cli:
  about:
    summary: "VRM ファイルを PMX 形式に変換します"
    viewer_hint: "引数なしで起動するとビューアが開きます"
  arg:
    input: "入力ファイルパス（VRM/FBX/PMX/PMD/OBJ/STL/.x/.unitypackage/.zip/.7z）"
    output: "出力 PMX ファイルパス"
    dump: "ボーン・頂点数のみ出力して PMX 生成しない"
    no_physics: "物理変換をスキップ"
    align_rigid_rotation: "剛体の回転をボーン方向に揃える（デフォルト: off）"
    normalize_pose: "T ポーズの腕を A スタンスに変換する（デフォルト: off）"
    normalize_to_tstance: "A スタンスの腕を T スタンスに変換する（FBX 用、デフォルト: off）"
    log_level: "ログレベル (error, warn, info, debug)"
    fbx_name: "unitypackage 内の FBX ファイル名を指定（省略時はファイルサイズ最大の FBX を自動選択）"
    model_name: "アーカイブ内のモデルファイル名を指定（省略時: 1 つなら自動、複数ならエラー）"
    list_models: "アーカイブ内のモデル一覧を表示して終了"
    raw_structure: "標準ボーン挿入をスキップ（元のボーン構造を維持）"
    scale: "PMX 出力倍率（デフォルト: 1.0）"
  dump:
    header: "=== %{format} ダンプ ==="
    model_name: "モデル名: %{name}"
    bones: "ボーン: %{count}"
    meshes: "メッシュ: %{count}"
    vertices_total: "頂点 (合計): %{count}"
    faces_total: "面 (合計): %{count}"
    materials: "材質: %{count}"
    textures: "テクスチャ: %{count}"
    morphs: "モーフ: %{count}"
    rigidbodies: "剛体: %{count}"
    joints: "ジョイント: %{count}"
    rig_type: "リグ種別: %{rig} (Humanoid: %{count} ボーン)"
    bone_list_header: "--- ボーン一覧 ---"
    bone_entry: "  [%{index}] %{name} (vrm: %{vrm})"
    morph_list_header: "--- モーフ一覧 ---"
    morph_entry: "  [panel%{panel}] %{name}"
  output:
    no_models_in_archive: "アーカイブ内にモデルファイルが見つかりません"
    archive_entry: "[%{kind}] %{path}"
    found_fbx_in_unitypackage: ".unitypackage 内に %{count} 個の FBX が見つかりました:"
    fbx_entry: "  FBX: %{name}"
    conversion_complete: "変換完了: %{input} -> %{output}"
    error_prefix: "エラー"
  error:
    viewer_feature_required: "ビューアは viewer feature 付きでビルドする必要があります。\n使い方: popone <入力.vrm> <出力.pmx>\nビューア: cargo build --features viewer"
