_version: 1

cli:
  about:
    summary: "Convert VRM files to PMX format"
    viewer_hint: "Launches the viewer when no arguments are given"
  arg:
    input: "Input file path (VRM/FBX/PMX/PMD/OBJ/STL/.x/.unitypackage/.zip/.7z)"
    output: "Output PMX file path"
    dump: "Print bone/vertex counts only; do not generate a PMX"
    no_physics: "Skip physics conversion"
    align_rigid_rotation: "Align rigid body rotation to bone direction (default: off)"
    normalize_pose: "Convert T-pose arms to A-stance (default: off)"
    normalize_to_tstance: "Convert A-stance arms to T-stance (FBX only, default: off)"
    log_level: "Log level (error, warn, info, debug)"
    fbx_name: "FBX file name inside a unitypackage (auto-selects the largest FBX if omitted)"
    model_name: "Model file name inside an archive (auto when only one; error when multiple if omitted)"
    list_models: "List models inside the archive and exit"
    raw_structure: "Skip standard bone insertion (preserve the original bone structure)"
    scale: "PMX output scale factor (default: 1.0)"
  dump:
    header: "=== %{format} dump ==="
    model_name: "Model name: %{name}"
    bones: "Bones: %{count}"
    meshes: "Meshes: %{count}"
    vertices_total: "Vertices (total): %{count}"
    faces_total: "Faces (total): %{count}"
    materials: "Materials: %{count}"
    textures: "Textures: %{count}"
    morphs: "Morphs: %{count}"
    rigidbodies: "Rigidbodies: %{count}"
    joints: "Joints: %{count}"
    rig_type: "Rig type: %{rig} (Humanoid: %{count} bones)"
    bone_list_header: "--- Bone list ---"
    bone_entry: "  [%{index}] %{name} (vrm: %{vrm})"
    morph_list_header: "--- Morph list ---"
    morph_entry: "  [panel%{panel}] %{name}"
  output:
    no_models_in_archive: "No model files found in archive"
    archive_entry: "[%{kind}] %{path}"
    found_fbx_in_unitypackage: "Found %{count} FBX files in .unitypackage:"
    fbx_entry: "  FBX: %{name}"
    conversion_complete: "Conversion complete: %{input} -> %{output}"
    error_prefix: "Error"
  error:
    viewer_feature_required: "Viewer must be built with the viewer feature.\nUsage: popone <input.vrm> <output.pmx>\nViewer: cargo build --features viewer"
    list_models_archive_only: "--list-models is only valid for archive files (.zip / .7z)"
    archive_load_failed: "Failed to read archive: %{path}"
    unsupported_archive_format: "Unsupported archive format: %{ext}"
    archive_list_failed: "Failed to list models in archive"
    model_name_cli_only: "--model-name is only valid in CLI conversion mode. Please specify an output file."
    output_required_zip: "An output file path is required.\nUsage: popone <input.zip> <output.pmx>"
    output_required_vrm: "An output file path is required.\nUsage: popone <input.vrm> <output.pmx>"
    logger_init_failed: "Failed to initialize logger"
    obj_extract_failed: "Failed to extract intermediate representation from OBJ"
    stl_extract_failed: "Failed to extract intermediate representation from STL"
    directx_extract_failed: "Failed to extract intermediate representation from DirectX .x"
    fbx_read_failed: "Failed to read FBX file: %{path}"
    fbx_extract_failed: "Failed to extract intermediate representation from FBX"
    unitypackage_read_failed: "Failed to read unitypackage: %{path}"
    unitypackage_extract_failed: "Failed to extract unitypackage"
    unitypackage_no_fbx: "No FBX file found in .unitypackage"
    fbx_not_found: "Specified FBX '%{name}' not found. Available: %{candidates}"
    prefab_resolve_failed: "Failed to resolve prefab textures"
    glb_load_failed: "Failed to load GLB: %{path}"
    vrm_extract_failed: "Failed to extract intermediate representation from VRM"
    output_dir_create_failed: "Failed to create output directory: %{path}"
    texture_write_failed: "Failed to write textures"
    pmx_build_failed: "Failed to build PMX model"
    output_file_create_failed: "Failed to create output file: %{path}"
    pmx_conversion_cancelled: "PMX conversion cancelled"
    pmx_write_failed: "Failed to write PMX"
    archive_no_models_found: "No model files found in archive"
    archive_model_extract_failed: "Failed to extract model"
    pmx_read_failed: "Failed to read PMX"
    pmx_extract_failed: "Failed to extract intermediate representation from PMX"
    pmd_read_failed: "Failed to read PMD"
    pmd_extract_failed: "Failed to extract intermediate representation from PMD"
    vrm_glb_read_failed: "Failed to read VRM/GLB"
    archive_unitypackage_extract_failed: "Failed to extract unitypackage inside archive"
    archive_unitypackage_no_fbx: "No FBX found in unitypackage inside archive"
    fbx_not_found_simple: "Specified FBX '%{name}' not found"
    archive_multiple_models: "%{count} models found. Specify with --model-name, or use --list-models to inspect."
    model_name_exact_multiple: "%{count} models exactly match \"%{name}\":\n  %{candidates}\nUse --list-models and specify by path."
    model_name_prefix_multiple: "%{count} models prefix-match \"%{name}\":\n  %{candidates}\nPlease be more specific."
    model_name_substr_multiple: "%{count} models substring-match \"%{name}\":\n  %{candidates}\nPlease be more specific."
    model_name_no_match: "No model in archive matches \"%{name}\".\nUse --list-models to inspect."
    viewer_icon_load_failed: "Failed to load icon image"
    viewer_launch_failed: "Failed to launch viewer: %{detail}"

error:
  glb_file_load_failed: "Failed to read GLB file: %{path}"
  glb_data_load_failed: "Failed to read GLB data"
  io_failed: "Failed to read file"
  gltf_parse_failed: "GLB/VRM parse failed"
