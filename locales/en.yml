    array_size_overflow: "Array size overflow: %{len} * %{element_size}"
    array_size_too_large: "Array size (%{size}) exceeds the limit (%{limit})"
    compressed_too_large: "Compressed data length (%{len}) exceeds remaining bytes (%{remaining})"
