  obj_parse_failed: "OBJ parse failed"
  stl_parse_failed: "STL parse failed"
  directx_parse_failed: "DirectX parse failed"
  extraction_failed: "Failed to extract intermediate representation"
  build_failed: "Failed to build PMX model"
  texture_failed: "Failed to write textures"
  image_failed: "Image processing failed"
  unitypackage_failed: "Failed to extract unitypackage"
  archive_failed: "Archive processing failed"
  pmx:
    field_negative: "%{field} is negative: %{val}"
    invalid_magic: "Invalid PMX magic number: %{magic}"
    unsupported_version: "Unsupported PMX version: %{version}"
    invalid_globals_count: "Invalid PMX header globals count: %{count} (expected: 8)"
    text_length_negative: "Text length is negative: %{len}"
    utf16_length_odd: "UTF-16LE text byte length is odd: %{len}"
    unsupported_weight_type: "Unsupported weight deform type: %{weight_type}"
    face_index_count_not_multiple_of_3: "Face index count is not a multiple of 3: %{count}"
    unsupported_morph_type: "Unsupported morph type: %{morph_type}"
    field:
