    not_yaml: "Not a Unity YAML file"
    params_load_failed: "Failed to read Humanoid parameters: %{path}"
    params_parse_failed: "Failed to parse Humanoid parameters JSON"
  vrma:
    vrma_load_failed: "Failed to read VRMA file: %{path}"
    gltf_load_failed: "Failed to read glTF file: %{path}"
    no_animations: "No animations found"
    extension_missing: "VRMC_vrm_animation extension not found"
    gltf_no_animations: "glTF contains no animations"
  archive:
    unsafe_path: "Unsafe archive path: %{raw}"
    model_index_out_of_range: "Model index out of range: %{index}"
    model_file_extract_failed: "Cannot extract model file: %{path}"
    model_file_extract_failed_simple: "Cannot extract model file"
    model_file_not_found: "Model file not found: %{path}"
    filename_decode_failed: "Failed to decode filename: %{raw}"
    size_limit_exceeded: "Extraction size limit exceeded: %{total} + %{size} > %{limit} bytes"
    size_limit_exceeded_actual: "Extraction size limit exceeded (actual read): %{total} + %{actual} > %{limit} bytes"
